<section>
  <h2>Transaction Details</h2>
  <? if (transaction) { ?>
    <dl>
      <dt>ID</dt>
      <dd><?= transaction.transactionId ?></dd>
      <dt>Date</dt>
      <dd><?= transaction.date.toLocaleDateString() ?></dd>
      <dt>Type</dt>
      <dd><?= transaction.type ?></dd>
      <dt>Category</dt>
      <dd><?= transaction.category.name ?></dd>
      <dt>Amount</dt>
      <dd><?= transaction.amount.amount ?> <?= transaction.amount.currency ?></dd>
      <dt>Description</dt>
      <dd><?= transaction.description ?></dd>
    </dl>
  <? } else { ?>
    <p>Transaction not found.</p>
  <? } ?>
  <a href="?page=transactions">Back to Transactions</a>
  <button onclick="confirmDelete('<?= transaction.transactionId ?>')" style="color: red;">Delete Transaction</button>

  <script>
    function confirmDelete(id) {
      if (confirm('Are you sure you want to delete this transaction?')) {
        google.script.run
          .withSuccessHandler(() => window.location.href = '?page=transactions')
          .withFailureHandler((err) => alert('Error: ' + err))
          .deleteTransaction(id);
      }
    }
  </script>
</section>
